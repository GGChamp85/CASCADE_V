services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: cascade-v-backend:latest
    container_name: cascade-v-backend
    restart: unless-stopped
    expose:
      - "8766"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8766/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: cascade-v-dashboard:latest
    container_name: cascade-v-dashboard
    restart: unless-stopped
    environment:
      API_TARGET: http://backend:8766
    ports:
      - "80:3000"
    depends_on:
      - backend
